name: Auto Release Foundry Module

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Vorbereitung und ZIP Erstellung
        run: |
          # Packt die Dateien in die module.zip
          zip -r module.zip module.json scripts/ styles/
          
          # Überprüfung im Log, ob die Datei existiert
          ls -lh module.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            module.json
            module.zip
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}